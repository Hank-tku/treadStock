name: Build — Windows (Release MSIX)

# Triggers:
#   - push to main: build only (artifact), no Release upload
#   - tag push (v*): build + upload MSIX to that tag's Release
#   - manual: build only
#
# The MSIX is unsigned (no paid code-signing certificate). Users install via
# PowerShell `Add-AppxPackage` with Windows Developer Mode enabled.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.5'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Drift + json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Create MSIX package
        run: dart run msix:create --store

      - name: Also create a portable ZIP (fallback for unsigned-MSIX install issues)
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "$releaseDir\stockpilot-windows-x64.zip" -Force

      # ----------------------------------------
      # Upload artifacts (always, for download from Actions UI)
      # ----------------------------------------
      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: stockpilot-windows-msix
          path: build/windows/x64/runner/Release/*.msix
          retention-days: 30

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: stockpilot-windows-zip
          path: build/windows/x64/runner/Release/stockpilot-windows-x64.zip
          retention-days: 30

      # ----------------------------------------
      # Attach to GitHub Release (only on tag push)
      # ----------------------------------------
      - name: Upload MSIX + ZIP to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows/x64/runner/Release/*.msix
            build/windows/x64/runner/Release/stockpilot-windows-x64.zip
          fail_on_unmatched_files: true
